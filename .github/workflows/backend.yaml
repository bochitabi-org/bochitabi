name: Backend Pipeline
on: workflow_dispatch
env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
  REGISTRY: ${{ secrets.GCP_REGISTRY }}
  REPOSITORY: ${{ secrets.GCP_REPOSITORY }}
  WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  APP_NAME: bochitabi
jobs:
  backend-build:
    name: backend build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Source checkout
        uses: actions/checkout@v5

      - name: Authentication
        uses: google-github-actions/auth@v3  
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}
      
      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker $REGISTRY

      - name: Build Docker image
        run: |
          cd backend
          docker build -t $REGISTRY/$PROJECT_ID/$REPOSITORY/$APP_NAME:$GITHUB_SHA . 
          docker tag $REGISTRY/$PROJECT_ID/$REPOSITORY/$APP_NAME:$GITHUB_SHA $REGISTRY/$PROJECT_ID/$REPOSITORY/$APP_NAME:latest
      
      - name: Push Docker image
        run: |
          docker push $REGISTRY/$PROJECT_ID/$REPOSITORY/$APP_NAME:$GITHUB_SHA
          docker push $REGISTRY/$PROJECT_ID/$REPOSITORY/$APP_NAME:latest

      - name: Deploy to Cloud run
        run: |
          gcloud run deploy $APP_NAME \
            --image $REGISTRY/$PROJECT_ID/$REPOSITORY/$APP_NAME:latest \
            --region asia-northeast1 \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 1
